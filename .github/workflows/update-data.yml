name: Update SNIES Data

on:
  schedule:
    - cron: "0 6 1 * *" # 1st of each month at 6 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    name: Refresh SNIES data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps
        run: npm install

      - name: Download SNIES Excel
        run: |
          echo "TODO: Automate HECAA download (requires JSF ViewState)"
          echo "For now, manually download and commit programas-export.xlsx"

      - name: Parse SNIES data
        run: npm run update-snies

      - name: Validate
        run: npm run validate

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/canonical/programs.csv
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update SNIES program data $(date +%Y-%m)"
            git push
          fi
